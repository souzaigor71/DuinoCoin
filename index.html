<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrokZão</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<meta name="theme-color" content="#7c5cff">
<style>
  :root{
    --accent:#7c5cff;
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --panel:#161328cc;
    --glow-neutro:#39e6c9;
    --glow-feliz:#39e67a;
    --glow-sarcastico:#b463ff;
    --glow-surpreso:#39c9e6;
    --glow-bravo:#ff3d5a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    display:flex;
    flex-direction:column;
    align-items:center;
    color:#f0eefc;
    padding:20px;
  }
  h1{
    margin:6px 0 18px;
    font-size:1.6rem;
    letter-spacing:1px;
    color:#fff;
    text-shadow:0 0 12px var(--accent);
  }

  /* ---------- Avatar (imagem) ---------- */
  .avatar-container{
    --glow-color:var(--glow-neutro);
    --glow-strength:0.35;
    width:260px;
    height:320px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:#0a0918;
    box-shadow:
      0 0 0 2px color-mix(in srgb, var(--glow-color) 60%, transparent),
      0 0 calc(20px + 40px*var(--glow-strength)) color-mix(in srgb, var(--glow-color) calc(var(--glow-strength)*100%), transparent),
      0 14px 34px rgba(0,0,0,.55);
    transition:box-shadow .12s linear, transform .25s ease;
    animation:bob 3.6s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
  }
  .avatar-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .avatar-container.falando{
    animation:bob 3.6s ease-in-out infinite, pulse 0.5s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.12); }
  }

  /* Cor do brilho por emoção */
  .avatar-container.neutro{ --glow-color:var(--glow-neutro); }
  .avatar-container.feliz{ --glow-color:var(--glow-feliz); }
  .avatar-container.sarcastico{ --glow-color:var(--glow-sarcastico); }
  .avatar-container.surpreso{ --glow-color:var(--glow-surpreso); }
  .avatar-container.bravo{ --glow-color:var(--glow-bravo); }

  /* ---------- Chat (abaixo do avatar) ---------- */
  .painel-chat{
    margin-top:22px;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    background:var(--panel);
    border-radius:16px;
    padding:14px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .log{
    max-height:280px;
    overflow-y:auto;
    padding:6px 4px;
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }
  .msg{
    padding:8px 12px;
    border-radius:12px;
    max-width:85%;
    font-size:.92rem;
    line-height:1.35;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--accent);
    color:#fff;
    border-bottom-right-radius:2px;
  }
  .msg.bot{
    align-self:flex-start;
    background:#2c2850;
    color:#eee;
    border-bottom-left-radius:2px;
  }
  .row{
    display:flex;
    gap:8px;
  }
  input[type=text]{
    flex:1;
    padding:11px 14px;
    border-radius:10px;
    border:none;
    background:#231f3f;
    color:#fff;
    font-size:.95rem;
    outline:none;
  }
  input[type=text]::placeholder{ color:#9a93c9; }
  button{
    padding:11px 18px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:filter .15s ease;
  }
  button:hover{ filter:brightness(1.15); }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  #micBtn{
    background:#2c2850;
    padding:11px 14px;
  }
  #micBtn.ativo{
    background:#e63946;
    animation:micPulse 1.2s ease-in-out infinite;
  }
  @keyframes micPulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(230,57,70,.5); }
    50%{ box-shadow:0 0 0 8px rgba(230,57,70,0); }
  }
  .status{
    font-size:.78rem;
    color:#b6aee6;
    min-height:16px;
    margin-top:6px;
    text-align:center;
  }

  /* ---------- Painel de mineração ---------- */
  .painel-miner{
    margin-top:16px;
    width:100%;
    max-width:420px;
    background:var(--panel);
    border-radius:16px;
    padding:14px 16px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .miner-titulo{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .miner-titulo h2{
    margin:0;
    font-size:1rem;
    color:#fff;
  }
  .miner-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#666;
    box-shadow:0 0 6px #666;
    transition:background .3s, box-shadow .3s;
  }
  .miner-dot.online{
    background:var(--glow-feliz);
    box-shadow:0 0 8px var(--glow-feliz);
  }
  .miner-dot.offline{
    background:var(--glow-bravo);
    box-shadow:0 0 8px var(--glow-bravo);
  }
  .miner-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .miner-item{
    background:#1c1836;
    border-radius:10px;
    padding:8px 10px;
  }
  .miner-item .rotulo{
    font-size:.7rem;
    color:#9a93c9;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .miner-item .valor{
    font-size:1.05rem;
    font-weight:600;
    color:#fff;
    margin-top:2px;
  }
  .miner-erro{
    font-size:.78rem;
    color:#ff8fa3;
    margin-top:8px;
    text-align:center;
  }

  /* ---------- Card de downloads oficiais ---------- */
  .card-downloads{
    margin-top:16px;
    width:100%;
    max-width:420px;
    background:var(--panel);
    border-radius:16px;
    padding:14px 16px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .card-downloads .info h2{
    margin:0 0 4px;
    font-size:.95rem;
    color:#fff;
  }
  .card-downloads .info p{
    margin:0;
    font-size:.78rem;
    color:#9a93c9;
  }
  .card-downloads a{
    flex-shrink:0;
    padding:9px 16px;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    font-weight:600;
    font-size:.85rem;
    white-space:nowrap;
  }
</style>
</head>
<body>

<h1>🤖 GrokZão</h1>

<div class="avatar-container neutro" id="avatarContainer">
  <img src="/avatar.jpg" alt="GrokZão" class="avatar-img">
</div>

<div class="painel-chat">
  <div class="log" id="log"></div>
  <div class="row">
    <input type="text" id="input" placeholder="Fala com o GrokZão..." autocomplete="off">
    <button id="sendBtn">Enviar</button>
    <button id="micBtn" title="Ativar escuta por voz">🎤</button>
  </div>
  <div class="status" id="status"></div>
  <div class="status" id="vozStatus"></div>
</div>

<div class="painel-miner">
  <div class="miner-titulo">
    <h2>⛏️ Painel de Mineração</h2>
    <span class="miner-dot" id="minerDot"></span>
  </div>
  <div class="miner-grid">
    <div class="miner-item">
      <div class="rotulo">Saldo (DUCO)</div>
      <div class="valor" id="minerSaldo">—</div>
    </div>
    <div class="miner-item">
      <div class="rotulo">Hashrate</div>
      <div class="valor" id="minerHashrate">—</div>
    </div>
    <div class="miner-item">
      <div class="rotulo">Aceitas</div>
      <div class="valor" id="minerAceitas">—</div>
    </div>
    <div class="miner-item">
      <div class="rotulo">Rejeitadas</div>
      <div class="valor" id="minerRejeitadas">—</div>
    </div>
  </div>
  <div class="miner-erro" id="minerErro"></div>
</div>

<div class="card-downloads">
  <div class="info">
    <h2>⬇️ Downloads oficiais</h2>
    <p>PC_Miner, Wallet e licença do projeto Duino-Coin.</p>
  </div>
  <!-- AJUSTE AQUI: coloque a URL real do site DuinoCoin/downloads.html -->
  <a href="https://SEU-SITE-DUINOCOIN.onrender.com/downloads.html" target="_blank">Ver</a>
</div>

<audio id="player" style="display:none"></audio>

<script>
const avatarContainer = document.getElementById('avatarContainer');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const log = document.getElementById('log');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');

// ---------- Web Audio API: brilho reage ao volume da fala ----------
let audioCtx, analyser, sourceNode, dataArray, rafId;

function iniciarAudioGraph(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaElementSource(player);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function animarBrilho(){
  analyser.getByteFrequencyData(dataArray);
  let soma = 0;
  for (let i=0;i<dataArray.length;i++) soma += dataArray[i];
  const media = soma / dataArray.length; // 0-255
  const intensidade = Math.min(1, 0.25 + media/140);
  avatarContainer.style.setProperty('--glow-strength', intensidade.toFixed(2));
  rafId = requestAnimationFrame(animarBrilho);
}

player.addEventListener('play', ()=>{
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  avatarContainer.classList.add('falando');
  animarBrilho();
});
player.addEventListener('pause', pararBrilho);
player.addEventListener('ended', pararBrilho);

function pararBrilho(){
  if (rafId) cancelAnimationFrame(rafId);
  avatarContainer.classList.remove('falando');
  avatarContainer.style.setProperty('--glow-strength', 0.35);
}

// ---------- Expressões (cor do brilho ao redor do avatar) ----------
function setEmocao(emocao){
  avatarContainer.classList.remove('neutro','feliz','sarcastico','surpreso','bravo');
  avatarContainer.classList.add(emocao || 'neutro');
}

// ---------- Chat ----------
function addMsg(texto, quem){
  const div = document.createElement('div');
  div.className = 'msg ' + quem;
  div.textContent = texto;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function enviar(){
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  addMsg(texto, 'user');
  sendBtn.disabled = true;
  statusEl.textContent = 'GrokZão está pensando...';

  try{
    const resp = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mensagem: texto})
    });
    const dados = await resp.json();

    if (dados.erro){
      addMsg('Erro: ' + dados.erro, 'bot');
      statusEl.textContent = '';
      sendBtn.disabled = false;
      return;
    }

    addMsg(dados.resposta, 'bot');
    setEmocao(dados.emocao);
    statusEl.textContent = '';

    if (dados.audio_url){
      iniciarAudioGraph();
      player.src = dados.audio_url + '?t=' + Date.now();
      await player.play();
    }
  }catch(e){
    addMsg('Erro de conexão com o servidor.', 'bot');
    statusEl.textContent = '';
  }finally{
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') enviar(); });

// ---------- Escuta contínua com palavra de ativação ("GrokZão") ----------
const micBtn = document.getElementById('micBtn');
const vozStatus = document.getElementById('vozStatus');
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

const PALAVRAS_ATIVACAO = ['alien', 'éilien', 'eilien', 'ariem', 'álien'];

let escutaAtiva = false;
let recognition = null;
let aguardandoComando = false;
let botoFalando = false;

function normalizar(txt){
  return txt.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function distanciaEdicao(a, b){
  const dp = Array.from({length: a.length + 1}, (_, i) => [i, ...Array(b.length).fill(0)]);
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++){
    for (let j = 1; j <= b.length; j++){
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[a.length][b.length];
}

function encontrarPalavraAtivacao(textoNormalizado){
  // tenta achar a substring diretamente primeiro
  for (const palavra of PALAVRAS_ATIVACAO){
    const p = normalizar(palavra);
    const idx = textoNormalizado.indexOf(p);
    if (idx !== -1) return idx + p.length;
  }
  // se não achou, tenta comparar palavra por palavra com tolerância a erro (fala parecida)
  const palavras = textoNormalizado.split(/\s+/);
  let posAcumulada = 0;
  for (const w of palavras){
    if (w.length >= 3 && distanciaEdicao(w, 'alien') <= 2){
      return posAcumulada + w.length;
    }
    posAcumulada += w.length + 1;
  }
  return -1;
}

function criarRecognition(){
  const r = new SpeechRecognitionAPI();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'pt-BR';

  r.onresult = (event) => {
    if (botoFalando) return; // ignora enquanto o robô está falando

    for (let i = event.resultIndex; i < event.results.length; i++){
      const resultado = event.results[i];

      if (!resultado.isFinal){
        if (!aguardandoComando){
          vozStatus.textContent = '🎤 ouvindo: "' + resultado[0].transcript + '"';
        }
        continue;
      }

      const transcricaoOriginal = resultado[0].transcript;
      const transcricao = normalizar(transcricaoOriginal);

      if (!aguardandoComando){
        const posAtivacao = encontrarPalavraAtivacao(transcricao);
        if (posAtivacao !== -1){
          const resto = transcricaoOriginal.slice(posAtivacao).trim();
          if (resto.length > 2){
            vozStatus.textContent = '🎤 Ouvi: "' + resto + '"';
            input.value = resto;
            enviar();
          } else {
            aguardandoComando = true;
            vozStatus.textContent = '🎤 Pode falar, estou ouvindo...';
          }
        }
      } else {
        vozStatus.textContent = '🎤 Ouvi: "' + transcricaoOriginal + '"';
        input.value = transcricaoOriginal;
        aguardandoComando = false;
        enviar();
      }
    }
  };

  r.onerror = (event) => {
    console.warn('Erro no reconhecimento de voz:', event.error);
  };

  r.onend = () => {
    if (escutaAtiva){
      try { r.start(); } catch(e){}
    }
  };

  return r;
}

function ativarEscuta(){
  if (!SpeechRecognitionAPI){
    vozStatus.textContent = 'Reconhecimento de voz não disponível neste navegador (use Chrome).';
    return;
  }
  escutaAtiva = true;
  micBtn.classList.add('ativo');
  vozStatus.textContent = '🎤 Escutando... diga "Alien" pra ativar';
  recognition = criarRecognition();
  try { recognition.start(); } catch(e){}
}

function desativarEscuta(){
  escutaAtiva = false;
  aguardandoComando = false;
  micBtn.classList.remove('ativo');
  vozStatus.textContent = '';
  if (recognition){
    try { recognition.stop(); } catch(e){}
  }
}

micBtn.addEventListener('click', () => {
  if (escutaAtiva) desativarEscuta();
  else ativarEscuta();
});

// pausa a escuta enquanto o robô fala, pra não se ouvir
player.addEventListener('play', () => { botoFalando = true; });
player.addEventListener('pause', () => { botoFalando = false; });
player.addEventListener('ended', () => { botoFalando = false; });

// ---------- Carregar histórico salvo ao abrir a página ----------
async function carregarHistorico(){
  try{
    const resp = await fetch('/historico');
    const dados = await resp.json();
    (dados.mensagens || []).forEach(m => addMsg(m.texto, m.quem));
  }catch(e){
    console.warn('Não foi possível carregar o histórico salvo.');
  }
}
carregarHistorico();
ativarEscuta();

// ---------- Painel de mineração ----------
const minerDot = document.getElementById('minerDot');
const minerSaldo = document.getElementById('minerSaldo');
const minerHashrate = document.getElementById('minerHashrate');
const minerAceitas = document.getElementById('minerAceitas');
const minerRejeitadas = document.getElementById('minerRejeitadas');
const minerErro = document.getElementById('minerErro');

async function atualizarMiner(){
  try{
    const resp = await fetch('/api/miner/status');
    const dados = await resp.json();

    minerDot.classList.remove('online', 'offline');
    minerDot.classList.add(dados.online ? 'online' : 'offline');

    minerSaldo.textContent = (dados.saldo !== null && dados.saldo !== undefined)
      ? Number(dados.saldo).toFixed(2)
      : '—';
    minerHashrate.textContent = dados.hashrate
      ? Number(dados.hashrate).toFixed(0) + ' H/s'
      : (dados.online ? '0 H/s' : 'offline');
    minerAceitas.textContent = dados.aceitas ?? '—';
    minerRejeitadas.textContent = dados.rejeitadas ?? '—';
    minerErro.textContent = dados.erro || '';
  }catch(e){
    minerDot.classList.remove('online');
    minerDot.classList.add('offline');
    minerErro.textContent = 'Não foi possível consultar o painel de mineração.';
  }
}

atualizarMiner();
setInterval(atualizarMiner, 20000); // atualiza a cada 20s
</script>

</body>
</html>
